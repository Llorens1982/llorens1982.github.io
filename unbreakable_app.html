<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f1a">
<title>Unbreakable Training</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;--red:#e94560;--green:#00d4aa;--yellow:#f5a623;--text:#e8e8f0;--dim:#8888aa;--rest:#6655cc}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden}
.hdr{background:linear-gradient(135deg,#1a1a2e,#0f3460);padding:18px 16px 14px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,.6)}
.hdr h1{font-size:20px;font-weight:900;letter-spacing:2px;color:var(--red);text-transform:uppercase}
.hdr p{font-size:11px;color:var(--dim);margin-top:2px}
.scr{display:none;padding-bottom:72px}
.scr.on{display:block}
.tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 14px;scrollbar-width:none;background:var(--bg);position:sticky;top:62px;z-index:40;border-bottom:1px solid rgba(255,255,255,.05)}
.tabs::-webkit-scrollbar{display:none}
.tab{background:var(--card);border:1px solid rgba(255,255,255,.08);color:var(--dim);border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tab.on{background:var(--red);border-color:var(--red);color:#fff}
.slist{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.scard{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.06);cursor:pointer;-webkit-tap-highlight-color:transparent}
.scard:active{opacity:.8}
.scard-bar{height:3px}
.scard-body{padding:13px 15px;display:flex;align-items:center;gap:13px}
.snum{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0}
.sinfo{flex:1;min-width:0}
.stitle{font-size:14px;font-weight:800;margin-bottom:3px}
.smeta{font-size:11px;color:var(--dim);margin-bottom:5px}
.schips{display:flex;gap:4px;flex-wrap:wrap}
.chip{font-size:10px;background:rgba(255,255,255,.07);color:var(--dim);padding:2px 7px;border-radius:5px;white-space:nowrap}
.sarrow{font-size:20px;color:var(--dim);flex-shrink:0}
.back{background:var(--card2);border:none;color:var(--text);padding:10px 16px;border-radius:10px;font-size:14px;cursor:pointer;margin:14px 14px 0;display:block}
.dtitle{font-size:20px;font-weight:900;padding:12px 14px 6px}
.ddesc{margin:0 14px 14px;background:var(--card);border-radius:12px;padding:12px;font-size:12px;color:var(--dim);line-height:1.6;white-space:pre-line}
.startbtn{display:block;margin:0 14px 18px;padding:15px;background:linear-gradient(135deg,var(--red),#a01535);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:900;letter-spacing:1px;text-transform:uppercase;cursor:pointer;width:calc(100% - 28px)}
.blk{margin:0 14px 18px}
.blklabel{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.blktag{background:rgba(15,52,96,.8);color:var(--red);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.blktype{font-size:11px;color:var(--dim);font-weight:600}
.exrow{background:var(--card);border-radius:12px;margin-bottom:7px;overflow:hidden;border:1px solid rgba(255,255,255,.05)}
.exmain{padding:11px 13px;display:flex;align-items:center;gap:10px;cursor:pointer}
.exset{background:var(--card2);width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--dim);flex-shrink:0}
.exname{font-size:13px;font-weight:600;flex:1}
.exname.rest{color:var(--rest);font-style:italic}
.badges{display:flex;gap:6px}
.bt{padding:2px 7px;border-radius:5px;font-size:10px;font-weight:700}
.bt-t{background:rgba(0,212,170,.15);color:var(--green)}
.bt-r{background:rgba(233,69,96,.15);color:var(--red)}
.bt-d{background:rgba(102,85,204,.15);color:var(--rest)}
.vbtn{background:none;border:none;color:var(--yellow);font-size:17px;cursor:pointer;padding:0 3px;flex-shrink:0}
.vembed{display:none;background:#000}
.vembed iframe{width:100%;height:100%;border:none}
.vembed.on{display:block}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;border-top:1px solid rgba(255,255,255,.06);padding-bottom:env(safe-area-inset-bottom);z-index:50}
.nbtn{flex:1;padding:11px 8px;background:none;border:none;color:var(--dim);font-size:10px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.nbtn.on{color:var(--red)}
.nicon{font-size:20px}
.workout{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;overflow-y:auto}
.workout.on{display:flex}
.whdr{background:var(--card);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.wsub{font-size:11px;color:var(--dim)}
.wname{font-size:15px;font-weight:800}
.exitbtn{background:rgba(233,69,96,.2);border:none;color:var(--red);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:800;cursor:pointer;flex-shrink:0}
.wbody{flex:1;padding:14px;display:flex;flex-direction:column;gap:11px}
.progwrap{background:var(--card);border-radius:6px;height:5px;overflow:hidden}
.progfill{height:100%;background:linear-gradient(90deg,var(--red),var(--yellow));transition:width .3s}
.progtxt{text-align:center;font-size:11px;color:var(--dim);margin-top:3px}
.curcard{background:linear-gradient(135deg,var(--card),var(--card2));border-radius:20px;padding:22px;text-align:center;border:1px solid rgba(233,69,96,.15)}
.curset{font-size:11px;color:var(--dim);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.curname{font-size:24px;font-weight:900;margin-bottom:5px;line-height:1.2}
.curname.rest{color:var(--rest);font-size:20px}
.curdetail{font-size:12px;color:var(--dim);margin-bottom:18px}
.tring{position:relative;width:150px;height:150px;margin:0 auto 16px}
.tsvg{transform:rotate(-90deg)}
.ttrack{fill:none;stroke:var(--card2);stroke-width:8}
.tfill{fill:none;stroke:var(--red);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.tfill.rest{stroke:var(--rest)}
.tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:900;letter-spacing:-2px}
.reps{font-size:64px;font-weight:900;color:var(--red);margin-bottom:6px;line-height:1}
.repslbl{font-size:14px;color:var(--dim);font-weight:700;margin-bottom:16px}
.wvideo{border-radius:12px;overflow:hidden}
.wvideo iframe{width:100%;height:100%;border:none}
.nextup{background:var(--card);border-radius:11px;padding:11px;display:flex;align-items:center;gap:9px}
.nextlbl{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.nextname{font-size:13px;font-weight:700}
.ctrls{display:flex;gap:9px}
.cbtn{flex:1;padding:13px;border:none;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer}
.cprev{background:var(--card2);color:var(--dim)}
.cpause{background:var(--card2);color:var(--yellow)}
.cnext{background:linear-gradient(135deg,var(--red),#a01535);color:#fff;flex:2}
.done{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px}
.done.on{display:flex}
.doneemoji{font-size:72px;margin-bottom:14px}
.donetitle{font-size:28px;font-weight:900;color:var(--red);margin-bottom:8px}
.donesub{color:var(--dim);font-size:14px;margin-bottom:28px;line-height:1.6}
.donebtn{background:linear-gradient(135deg,var(--red),#a01535);color:#fff;border:none;border-radius:14px;padding:15px 44px;font-size:15px;font-weight:900;cursor:pointer}
.beepind{display:none;position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;border-radius:20px;padding:6px 16px;font-weight:900;font-size:13px;z-index:999;white-space:nowrap}
.beepind.on{display:block}
.phase-header{margin-bottom:10px}
.phase-tag{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
</style>
</head>
<body>

<div class="hdr">
  <h1>🔥 Unbreakable</h1>
  <p>50 sesiones de entrenamiento</p>
</div>

<div id="scrList" class="scr on">
  <div class="tabs">
    <button class="tab on" onclick="setFilter('all',this)">Todas</button>
    <button class="tab" onclick="setFilter('fuerza',this)">💪 Fuerza</button>
    <button class="tab" onclick="setFilter('flow',this)">🌊 Flow</button>
    <button class="tab" onclick="setFilter('potencia',this)">⚡ Potencia</button>
    <button class="tab" onclick="setFilter('tabata',this)">🔥 Tabata</button>
    <button class="tab" onclick="setFilter('metabolica',this)">💦 Metabólica</button>
  </div>
  <div class="slist" id="slist"></div>
</div>

<div id="scrDetail" class="scr">
  <button class="back" onclick="goBack()">← Volver</button>
  <div id="detailContent"></div>
</div>

<div class="bnav">
  <button class="nbtn on" onclick="setNav(0,this)"><span class="nicon">🏋️</span>Sesiones</button>
  <button class="nbtn" onclick="setNav(1,this)"><span class="nicon">📊</span>Progreso</button>
</div>

<div class="workout" id="workout">
  <div class="whdr">
    <div style="flex:1"><div class="wsub" id="wsub"></div><div class="wname" id="wblk"></div></div>
    <button class="exitbtn" onclick="exitWorkout()">✕ Salir</button>
  </div>
  <div class="wbody">
    <div><div class="progwrap"><div class="progfill" id="wfill"></div></div><div class="progtxt" id="wptxt"></div></div>
    <div class="curcard">
      <div class="curset" id="wset"></div>
      <div class="curname" id="wexname"></div>
      <div class="curdetail" id="wdetail"></div>
      <div class="tring" id="tring">
        <svg class="tsvg" width="150" height="150" viewBox="0 0 150 150">
          <circle class="ttrack" cx="75" cy="75" r="63"/>
          <circle class="tfill" id="tfill" cx="75" cy="75" r="63"/>
        </svg>
        <div class="tnum" id="tnum">0</div>
      </div>
      <div id="repsDisp" style="display:none"><div class="reps" id="repsN"></div><div class="repslbl">REPETICIONES</div></div>
    </div>
    <div class="wvideo" id="wvid"></div>
    <div class="nextup" id="nextup"><span style="font-size:18px">▶</span><div><div class="nextlbl">A continuación</div><div class="nextname" id="nextname"></div></div></div>
    <div class="ctrls">
      <button class="cbtn cprev" onclick="prevEx()">⏮</button>
      <button class="cbtn cpause" id="pausebtn" onclick="togglePause()">⏸ Pausa</button>
      <button class="cbtn cnext" onclick="nextEx()">Siguiente →</button>
    </div>
  </div>
</div>

<div class="done" id="doneScr">
  <div class="doneemoji">🏆</div>
  <div class="donetitle">¡Sesión completada!</div>
  <div class="donesub" id="donesub"></div>
  <button class="donebtn" onclick="exitWorkout()">Volver al inicio</button>
</div>

<div class="beepind" id="beepind"></div>

function getCat(k){
  const d=(DATA[k].description||'').toLowerCase();
  const t=DATA[k].exercises.map(e=>(e.block_type||'').toLowerCase()).join(' ');
  const s=d+' '+t;
  if(s.includes('flow')) return 'flow';
  if(s.includes('tabata')) return 'tabata';
  if(s.includes('potencia')||s.includes('explosiv')) return 'potencia';
  if(s.includes('metabol')) return 'metabolica';
  if(s.includes('fuerza')) return 'fuerza';
  return 'default';
}

function ytId(url){
  if(!url||url==='nan'||url==='undefined') return null;
  // Handle all YouTube formats including Shorts
  const patterns = [
    /youtube\.com\/shorts\/([a-zA-Z0-9_-]{6,})/,
    /youtu\.be\/([a-zA-Z0-9_-]{6,})/,
    /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{6,})/,
    /youtube\.com\/embed\/([a-zA-Z0-9_-]{6,})/
  ];
  for(const p of patterns){
    const m=url.match(p);
    if(m) return m[1];
  }
  return null;
}

function makeVideoPlayer(vid, autoOpen){
  // Show thumbnail + play button. Click opens YouTube directly (no iframe restrictions)
  const wrap = document.createElement('div');
  wrap.style.cssText='position:relative;width:100%;aspect-ratio:16/9;background:#000;cursor:pointer;border-radius:10px;overflow:hidden';

  // Thumbnail
  const img = document.createElement('img');
  img.src = 'https://img.youtube.com/vi/'+vid+'/hqdefault.jpg';
  img.style.cssText='width:100%;height:100%;object-fit:cover;display:block';
  img.onerror = ()=>{ img.src='https://img.youtube.com/vi/'+vid+'/0.jpg'; };

  // Play button overlay
  const btn = document.createElement('div');
  btn.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.35)';
  btn.innerHTML='<div style="width:56px;height:56px;background:red;border-radius:50%;display:flex;align-items:center;justify-content:center"><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg></div>';

  // Label
  const lbl = document.createElement('div');
  lbl.style.cssText='position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:11px;color:rgba(255,255,255,0.8);font-weight:600';
  lbl.textContent='▶ Abrir en YouTube';

  wrap.appendChild(img);
  wrap.appendChild(btn);
  wrap.appendChild(lbl);

  const ytUrl = 'https://www.youtube.com/watch?v='+vid;
  wrap.addEventListener('click', ()=> window.open(ytUrl, '_blank'));

  return wrap;
}

    info.appendChild(meta);
    
    const chips = document.createElement('div');
    chips.className = 'schips';
    uniq.forEach(n=>{ const sp=document.createElement('span'); sp.className='chip'; sp.textContent=n; chips.appendChild(sp); });
    info.appendChild(chips);
    body.appendChild(info);
    
    const arrow = document.createElement('div');
    arrow.className = 'sarrow';
    arrow.textContent = '›';
    body.appendChild(arrow);
    
    card.appendChild(body);
    card.addEventListener('click', ()=>openSession(k));
    el.appendChild(card);
  });
}

function setFilter(f, btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const keys = f==='all' ? KEYS : KEYS.filter(k=>getCat(k)===f);
  renderList(keys);
}

// ---------- SESSION DETAIL ----------

function makePhaseRow(ex, idx, phase){
  const vid = ytId(ex.video);
  const eid = phase+'_'+idx;
  const row = document.createElement('div'); row.className='exrow';
  const main = document.createElement('div'); main.className='exmain';
  const setEl = document.createElement('div'); setEl.className='exset'; setEl.textContent=idx+1; main.appendChild(setEl);
  const nm = document.createElement('div'); nm.className='exname'; nm.textContent=ex.name; main.appendChild(nm);
  const bd = document.createElement('div'); bd.className='badges';
  if(ex.time>0){const sp=document.createElement('span');sp.className='bt bt-t';sp.textContent=ex.time+'s';bd.appendChild(sp);}
  if(ex.reps>0){const sp=document.createElement('span');sp.className='bt bt-r';sp.textContent=ex.reps+' reps';bd.appendChild(sp);}
  main.appendChild(bd);
  if(vid){const vb=document.createElement('button');vb.className='vbtn';vb.textContent='▶';vb.addEventListener('click',e=>{e.stopPropagation();toggleVid(eid);});main.appendChild(vb);}
  main.addEventListener('click',()=>toggleVid(eid));
  row.appendChild(main);
  if(vid){const ve=document.createElement('div');ve.className='vembed';ve.id=eid;ve.dataset.vid=vid;row.appendChild(ve);}
  return row;
}

function makePhaseSection(title, color, icon, exercises, phase){
  const wrap=document.createElement('div'); wrap.style.cssText='margin:0 14px 18px';
  const hdr=document.createElement('div'); hdr.style.marginBottom='10px';
  const tag=document.createElement('span');
  tag.style.cssText='display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;background:'+color+'20;color:'+color;
  tag.textContent=icon+' '+title;
  hdr.appendChild(tag); wrap.appendChild(hdr);
  exercises.forEach((ex,i)=>wrap.appendChild(makePhaseRow(ex,i,phase)));
  return wrap;
}

function openSession(k){
  curSession = k;
  const s = DATA[k];
  const blocks = {};
  s.exercises.forEach(ex=>{
    if(!blocks[ex.block]) blocks[ex.block]={type:'',exs:[]};
    if(ex.block_type&&ex.block_type!=='NaN'&&ex.block_type!=='') blocks[ex.block].type=ex.block_type;
    blocks[ex.block].exs.push(ex);
  });
  const BTYPE={super_series:'Super Series',tabata:'Tabata',interval_repetitions_with_pause:'Intervalos',emom:'EMOM',for_time:'For Time'};
  
  const dc = document.getElementById('detailContent');
  dc.innerHTML = '';
  
  const t = document.createElement('div'); t.className='dtitle'; t.textContent=k; dc.appendChild(t);
  const d = document.createElement('div'); d.className='ddesc'; d.textContent=s.description||'Sin descripción'; dc.appendChild(d);
  const sb = document.createElement('button'); sb.className='startbtn'; sb.textContent='▶ INICIAR SESIÓN'; sb.addEventListener('click',()=>startWorkout(k)); dc.appendChild(sb);

  // Warmup
  dc.appendChild(makePhaseSection('Calentamiento','#f5a623','🔥',WARMUP,'warm'));

  // Training header
  const trainWrap=document.createElement('div'); trainWrap.style.cssText='margin:0 14px 10px';
  const trainTag=document.createElement('span'); trainTag.style.cssText='display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;background:#e9456020;color:#e94560';
  trainTag.textContent='💪 Entrenamiento'; trainWrap.appendChild(trainTag); dc.appendChild(trainWrap);

  Object.entries(blocks).forEach(([bn,bl])=>{
    const blkDiv = document.createElement('div'); blkDiv.className='blk';
    const lbl = document.createElement('div'); lbl.className='blklabel';
    const tag = document.createElement('span'); tag.className='blktag'; tag.textContent='Bloque '+bn; lbl.appendChild(tag);
    if(bl.type&&bl.type!=='NaN'){ const tp=document.createElement('span'); tp.className='blktype'; tp.textContent=BTYPE[bl.type]||bl.type; lbl.appendChild(tp); }
    blkDiv.appendChild(lbl);

    bl.exs.forEach((ex,i)=>{
      const rest = ex.name==='Descanso';
      const vid = ytId(ex.video);
      const eid = 'v_'+bn+'_'+i;
      
      const row = document.createElement('div'); row.className='exrow';
      const main = document.createElement('div'); main.className='exmain';
      
      const setEl = document.createElement('div'); setEl.className='exset'; setEl.textContent=ex.set; main.appendChild(setEl);
      const nm = document.createElement('div'); nm.className='exname'+(rest?' rest':''); nm.textContent=ex.name; main.appendChild(nm);
      const bd = document.createElement('div'); bd.className='badges';
      if(ex.time>0){ const sp=document.createElement('span'); sp.className='bt '+(rest?'bt-d':'bt-t'); sp.textContent=ex.time+'s'; bd.appendChild(sp); }
      if(ex.reps>0){ const sp=document.createElement('span'); sp.className='bt bt-r'; sp.textContent=ex.reps+' reps'; bd.appendChild(sp); }
      main.appendChild(bd);
      
      if(vid){ const vb=document.createElement('button'); vb.className='vbtn'; vb.textContent='▶'; vb.addEventListener('click',e=>{e.stopPropagation();toggleVid(eid);}); main.appendChild(vb); }
      main.addEventListener('click',()=>toggleVid(eid));
      row.appendChild(main);
      
      if(vid){
        const ve=document.createElement('div'); ve.className='vembed'; ve.id=eid;
        ve.dataset.vid=vid; // store video ID, load iframe on demand
        row.appendChild(ve);
      }
      blkDiv.appendChild(row);
    });
    dc.appendChild(blkDiv);
  });
  
  // Add cooldown section at the bottom
  dc.appendChild(makePhaseSection('Movilidad & Enfriamiento','#00d4aa','🧘',COOLDOWN,'cool'));

  showScreen('scrDetail');
  document.getElementById('scrDetail').scrollTop=0;
}

function toggleVid(eid){
  const el=document.getElementById(eid); if(!el) return;
  const was=el.classList.contains('on');
  document.querySelectorAll('.vembed.on').forEach(v=>{
    v.classList.remove('on');
    v.innerHTML='';
  });
  if(!was){
    el.classList.add('on');
    const vid=el.dataset.vid;
    if(vid) el.appendChild(makeVideoPlayer(vid));
    el.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

// ---------- WORKOUT ----------
function startWorkout(k){
  curSession=k; wi=0; paused=false;

  // Tag warmup exercises with phase info
  const warmupEx = WARMUP.map((e,i)=>Object.assign({},e,{block:0, set:i+1, phase:'warmup'}));
  // Tag main exercises
  const mainEx = DATA[k].exercises.map(e=>Object.assign({},e,{phase:'main'}));
  // Tag cooldown exercises
  const cooldownEx = COOLDOWN.map((e,i)=>Object.assign({},e,{block:999, set:i+1, phase:'cooldown'}));

  wx = [...warmupEx, ...mainEx, ...cooldownEx];

  document.getElementById('wsub').textContent=k;
  document.getElementById('workout').classList.add('on');
  showEx(0);
}

function showEx(i){
  if(i>=wx.length){ finishWorkout(); return; }
  stopTimer(); wi=i;
  const ex=wx[i], tot=wx.length, rest=ex.name==='Descanso';
  document.getElementById('wfill').style.width=Math.round(i/tot*100)+'%';
  document.getElementById('wptxt').textContent='Ejercicio '+(i+1)+' de '+tot;
  const phaseLabel = ex.phase==='warmup' ? '🔥 Calentamiento' : ex.phase==='cooldown' ? '🧘 Enfriamiento' : 'Bloque '+ex.block+' · Set '+ex.set;
  document.getElementById('wblk').textContent=phaseLabel;
  const setLabel = rest ? '⏸ DESCANSO' : (ex.phase==='warmup'||ex.phase==='cooldown') ? 'EJERCICIO '+ex.set : 'SET '+ex.set;
  document.getElementById('wset').textContent=setLabel;
  const ne=document.getElementById('wexname'); ne.textContent=ex.name; ne.className='curname'+(rest?' rest':'');
  let det='';
  if(ex.time>0&&ex.reps>0) det=ex.time+'s · '+ex.reps+' reps';
  else if(ex.time>0) det=ex.time+' segundos';
  else if(ex.reps>0) det=ex.reps+' repeticiones';
  document.getElementById('wdetail').textContent=det;
  const tr=document.getElementById('tring'), rd=document.getElementById('repsDisp');
  if(ex.time>0){ tr.style.display='block'; rd.style.display='none'; startTimer(ex.time,rest); }
  else if(ex.reps>0){ tr.style.display='none'; rd.style.display='block'; document.getElementById('repsN').textContent=ex.reps; }
  else{ tr.style.display='none'; rd.style.display='none'; }
  const vid=ytId(ex.video), wv=document.getElementById('wvid');
  if(vid){ wv.innerHTML=''; wv.appendChild(makeVideoPlayer(vid)); }
  else wv.innerHTML='';
  const nx=wx[i+1];
  if(nx){ document.getElementById('nextname').textContent=nx.name+(nx.time?' ('+nx.time+'s)':nx.reps?' ('+nx.reps+' reps)':''); document.getElementById('nextup').style.display='flex'; }
  else document.getElementById('nextup').style.display='none';
}

function startTimer(s,rest){
  tsec=s; tmax=s; paused=false;
  const f=document.getElementById('tfill'), C=2*Math.PI*63;
  f.className='tfill'+(rest?' rest':''); f.style.strokeDasharray=C;
  updTimer(s);
  wtimer=setInterval(()=>{
    if(!paused){
      tsec--; updTimer(tsec);
      if(tsec<=3&&tsec>0) beep('s');
      if(tsec<=0){ stopTimer(); beep('l'); blink('¡SIGUIENTE!'); setTimeout(nextEx,800); }
    }
  },1000);
}
function updTimer(s){ document.getElementById('tnum').textContent=s; document.getElementById('tfill').style.strokeDashoffset=2*Math.PI*63*(1-s/tmax); }
function stopTimer(){ if(wtimer){clearInterval(wtimer);wtimer=null;} }
function togglePause(){ paused=!paused; document.getElementById('pausebtn').textContent=paused?'▶ Continuar':'⏸ Pausa'; }
function nextEx(){ showEx(wi+1); }
function prevEx(){ if(wi>0) showEx(wi-1); }

function finishWorkout(){
  stopTimer();
  document.getElementById('workout').classList.remove('on');
  if(!completed.includes(curSession)){ completed.push(curSession); saveCompleted(); }
  document.getElementById('donesub').textContent='Has completado '+curSession+'. ¡Sigue así!';
  document.getElementById('doneScr').classList.add('on');
}
function exitWorkout(){
  stopTimer();
  document.getElementById('workout').classList.remove('on');
  document.getElementById('doneScr').classList.remove('on');
  renderList(KEYS);
  goBack();
}

function beep(t){
  try{
    if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    o.frequency.value=t==='l'?880:660;
    g.gain.setValueAtTime(0.3,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+(t==='l'?0.4:0.15));
    o.start(); o.stop(actx.currentTime+(t==='l'?0.4:0.15));
  }catch(e){}
}
function blink(txt){ const el=document.getElementById('beepind'); el.textContent=txt; el.classList.add('on'); setTimeout(()=>el.classList.remove('on'),900); }

function setNav(n,btn){
  document.querySelectorAll('.nbtn').forEach(b=>b.classList.remove('on')); btn.classList.add('on');
  if(n===0){ showScreen('scrList'); }
  else{
    const done=completed.length, total=KEYS.length;
    const dc=document.getElementById('detailContent');
    dc.innerHTML='<div style="text-align:center;padding:24px 0 16px"><div style="font-size:56px;font-weight:900;color:var(--red)">'+done+'</div><div style="font-size:13px;color:var(--dim)">de '+total+' sesiones completadas</div><div style="background:var(--card);border-radius:8px;height:7px;margin:12px auto;overflow:hidden;width:80%"><div style="background:linear-gradient(90deg,var(--red),var(--yellow));height:100%;width:'+Math.round(done/total*100)+'%"></div></div></div>';
    KEYS.forEach(k=>{ const row=document.createElement('div'); row.style.cssText='padding:10px 14px;background:var(--card);border-radius:10px;margin:0 14px 7px;display:flex;align-items:center;gap:10px'; row.innerHTML='<span>'+(completed.includes(k)?'✅':'⭕')+'</span><span style="font-size:13px;font-weight:700">'+k+'</span>'; dc.appendChild(row); });
    showScreen('scrDetail');
  }
}

// START
renderList(KEYS);

</script>
